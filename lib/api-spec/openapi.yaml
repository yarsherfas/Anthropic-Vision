openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Character AI Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: characters
    description: Character operations
  - name: chats
    description: Chat operations
  - name: messages
    description: Message operations
  - name: categories
    description: Category operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List all characters
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: featured
          schema:
            type: boolean
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Create a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /characters/featured:
    get:
      operationId: getFeaturedCharacters
      tags: [characters]
      summary: Get featured characters
      responses:
        "200":
          description: Featured characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"

  /characters/stats:
    get:
      operationId: getCharacterStats
      tags: [characters]
      summary: Get platform stats
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /characters/{id}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Get a character by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          description: Not found
    patch:
      operationId: updateCharacter
      tags: [characters]
      summary: Update a character
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterUpdate"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
    delete:
      operationId: deleteCharacter
      tags: [characters]
      summary: Delete a character
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /chats:
    get:
      operationId: listChats
      tags: [chats]
      summary: List all chats
      responses:
        "200":
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chat"
    post:
      operationId: createChat
      tags: [chats]
      summary: Start a new chat with a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "201":
          description: Created chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{id}:
    get:
      operationId: getChat
      tags: [chats]
      summary: Get a chat by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "404":
          description: Not found
    delete:
      operationId: deleteChat
      tags: [chats]
      summary: Delete a chat
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chats/{id}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get messages for a chat
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a chat
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent, returns both user message and AI reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagePair"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Character:
      type: object
      required: [id, name, description, persona, category, avatarUrl, messageCount, isFeatured, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        persona:
          type: string
        category:
          type: string
        avatarUrl:
          type: ["string", "null"]
        messageCount:
          type: integer
        isFeatured:
          type: boolean
        createdAt:
          type: string

    CharacterInput:
      type: object
      required: [name, description, persona, category]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        persona:
          type: string
          minLength: 1
        category:
          type: string
        avatarUrl:
          type: string
        isFeatured:
          type: boolean

    CharacterUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        persona:
          type: string
        category:
          type: string
        avatarUrl:
          type: string
        isFeatured:
          type: boolean

    Category:
      type: object
      required: [id, name, slug, characterCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        characterCount:
          type: integer

    Chat:
      type: object
      required: [id, characterId, characterName, characterAvatarUrl, lastMessageAt, messageCount, title]
      properties:
        id:
          type: integer
        characterId:
          type: integer
        characterName:
          type: string
        characterAvatarUrl:
          type: ["string", "null"]
        title:
          type: string
        lastMessageAt:
          type: ["string", "null"]
        messageCount:
          type: integer

    ChatInput:
      type: object
      required: [characterId]
      properties:
        characterId:
          type: integer
        title:
          type: string

    Message:
      type: object
      required: [id, chatId, role, content, createdAt]
      properties:
        id:
          type: integer
        chatId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    MessagePair:
      type: object
      required: [userMessage, assistantMessage]
      properties:
        userMessage:
          $ref: "#/components/schemas/Message"
        assistantMessage:
          $ref: "#/components/schemas/Message"

    PlatformStats:
      type: object
      required: [totalCharacters, totalChats, totalMessages, featuredCount]
      properties:
        totalCharacters:
          type: integer
        totalChats:
          type: integer
        totalMessages:
          type: integer
        featuredCount:
          type: integer
