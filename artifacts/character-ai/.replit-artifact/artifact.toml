kind = "web"
previewPath = "/"
title = "Character AI"
version = "1.0.0"
id = "artifacts/character-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23390

[services.development]
run = "pnpm --filter @workspace/character-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/character-ai", "run", "build" ]
publicDir = "artifacts/character-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23390"
BASE_PATH = "/"
